<html> 
    <head> 
        <title>Registration page</title> 
        <style>         
        body 
        {          
            background: #EEAECA; 
            background-image: linear-gradient(90deg, #e3ffe7 0%, #d9e7ff 100%);
            justify-content: center;
            
        } 
        .container
        {
            justify-content: center;
            display: flex;
        }
        form 
        { 
            display: flex;             
            flex-direction: column; 
            gap: 10px;       
            line-height: 1.9; 
            margin-bottom: 30px; 
            
        }
        a
            {
                text-decoration: none;
                color: rgb(0, 0, 0);
            }
        .box 
        {   
            justify-content: center;
            background-color:rgba(148, 188, 233, 0.226);             
            height:auto;
            padding: 40px;
            border-color: black;            
            width:600px;             
            padding: 20px; 
            border-radius: 25px; 
            font-size: 28px;
            box-shadow: 10px 10px 10px rgb(107, 168, 207); 
            transition: all 0.3s ease;
        } 
        .box:hover
        {
            transform: scale(1.01);
            box-shadow: 10px 10px 10px rgb(38, 49, 125);
        }
        input,option,select 
        { 
            margin: 12px;
            border: none;       
            color: black;   
            background-color: rgb(166, 213, 232);  
            background: transparent; 
            border-bottom: 1px solid white; 
        } 
        button 
        { 
            text-decoration: none;
            margin-left: 50px;
            height: 30px;             
            width:70px;             
            border-radius: 10px;             
            border: 1px solid;             
            transition: all 0.3sec ease; 
        } 
        button:hover 
        { 
            align-items: center;
            text-decoration: none;
            transform: scale(1.01); 
            background-color: #08328e; 
            color:white;
        } 
        h2
        {
            text-align: center;
            font-display:fallback;
        }
        input:placeholder-shown
        {
            text-align: center;
        }
    </style> 
    </head>
    <body>
        <div class="body">
            <div class="container">
     <div class="box"> 
        <center><h2>Login to <i>TravelPlanner</i></h2></center>
        <br>
        <form> 
            <input type="tel" placeholder="enter your mobile number" required> <br>
            <input type="email" placeholder="enter your email" required><br>
            <input type="password" placeholder="enter your password" required><br>

            <div class="button"> 
                <center>
                    <button >
             <a href="travelmain.html">Login</a>
                </button>
            </a> </center>
              </div>
        </form>
     </div></div></div>
    </body>
