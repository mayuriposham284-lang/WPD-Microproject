<html> 
    <head> 
        <title>Login Page</title> 
        <style>         
        body 
        {          
            background: #EEAECA; 
            background-image: linear-gradient(90deg, #e3ffe7 0%, #d9e7ff 100%);
            justify-content: center;
        } 
        .container
        {
            justify-content: center;
            display: flex;
        }
        form 
        { 
            display: flex;             
            flex-direction: column; 
            gap: 5px;       
            line-height: 1.9; 
            margin-bottom: 30px;
        }
        a
        {
            text-decoration: none;
            color: rgb(0, 0, 0);
        }
        header
        {
            margin-top: 30px;
            text-align: center;
            font-size: 44px;
            color: black;
            font-weight: bold;
            font-family: Comic Sans MS;
        }
        .box 
        {   
            justify-content: center;
            background-color:rgba(148, 188, 233, 0.226);             
            height:auto;
            margin-top: 20px;
            padding: 40px;
            border-color: black;            
            width:450px;             
            padding: 20px; 
            border-radius: 25px; 
            font-size: 28px;
            box-shadow:10px 10px 10px rgb(107, 168, 207); 
            transition: all 0.3s ease;
        } 
        .box:hover
        {
            transform: scale(1.01);
            box-shadow: 10px 10px 10px rgb(135, 141, 179);
        }
        input,option,select 
        { 
            margin: 12px;
            margin-bottom: 0px;
            border: none;       
            color: black;   
            background-color: rgb(166, 213, 232);  
            background: transparent; 
            border-bottom: 1px solid white; 
        } 
        button 
        { 
            text-decoration: none;
            margin-left: 50px;
            background-color: black;
            color: #ffffff;
            border-color: white;
            height: 40px;    
            cursor: pointer;          
            width:90px;       
            margin-top: 0px;      
            border-radius: 10px;             
            border: 1px solid;             
            transition: all 0.3sec ease; 
        } 
        a
        {
            color: white;
        }
        a:hover
        {
            color: black;
        }
        button:hover 
        { 
            align-items: center;
            text-decoration: none;
            transform: scale(1.01); 
            background-color: #fefefe; 
            color:rgb(0, 0, 0);
        } 
        h2
        {
            text-align: center;
            font-display:fallback;
        }
    </style> 
    </head>
    <header>
        <div class="header">
            TravelPlanner
        </div><hr color="black">
    </header>
    <body>
        <div class="body">
            <div class="container">
     <div class="box"> 
        <center><h2>Login</h2></center>
        <br>
        <form> 
            <input type="tel" placeholder="enter your mobile number" required> <br>
            <input type="email" placeholder="enter your email" required><br>
            <input type="password" placeholder="enter your password" required><br>
            <div class="button"> 
                <center>
                    <button >
             <a href="travelmain.html">Login</a>
                </button>
            </a> </center>
              </div>
        </form>
     </div></div></div>
    </body>
